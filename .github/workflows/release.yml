name: Release Tauri App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: "macos-latest"
            args: "--target aarch64-apple-darwin"
            bundle_nickname: "macOS Apple Silicon"
          - runner: "macos-15-intel"
            args: "--target x86_64-apple-darwin"
            bundle_nickname: "macOS Intel"
          - runner: "windows-latest"
            args: ""
            bundle_nickname: "Windows"
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          releaseName: "Codex Tools ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          releaseBody: |
            Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

            Build matrix includes:
            - macOS Apple Silicon (aarch64)
            - macOS Intel (x86_64)
            - Windows
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
